name: Deploy Firebase rules

on:
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: 'Set to true to deploy Cloud Functions (manual only)'
        required: false
        default: 'false'
  push:
    branches:
      - main

jobs:
  deploy-rules:
    name: Deploy Firestore rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firebase-tools
        run: npm install -g firebase-tools
      - name: Write service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "${RUNNER_TEMP}/firebase-service-account.json"
          chmod 600 "${RUNNER_TEMP}/firebase-service-account.json"
      - name: Deploy Firestore rules
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          PROJECT_ID="${FIREBASE_PROJECT_ID:-prabha-skin}"
          firebase deploy --project "$PROJECT_ID" --only firestore:rules

  deploy-functions:
    name: (Manual) Deploy Cloud Functions
    runs-on: ubuntu-latest
    needs: deploy-rules
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_functions == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install firebase-tools
        run: npm install -g firebase-tools
      - name: Install function deps
        run: |
          cd functions
          npm install
      - name: Write service account
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            echo "Missing FIREBASE_SERVICE_ACCOUNT_JSON secret."
            exit 1
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT_JSON" > "${RUNNER_TEMP}/firebase-service-account.json"
          chmod 600 "${RUNNER_TEMP}/firebase-service-account.json"
      - name: Deploy Functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-service-account.json
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
        run: |
          PROJECT_ID="${FIREBASE_PROJECT_ID:-prabha-skin}"
          firebase deploy --project "$PROJECT_ID" --only functions:purgeOldScreenshots,functions:stripImageMetadataOnFinalize,functions:notifyPaymentRequestCreated,functions:notifyAppReviewCreated
